name: Release

on:
  release:
    types: [published]

jobs:
  release:
    name: Package and attach release asset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Bump the version in manifest.json to match the git tag (e.g. v0.1.0 → 0.1.0)
      - name: Sync manifest version with release tag
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"   # strip leading "v"
          sed -i "s/\"version\": \".*\"/\"version\": \"${VERSION}\"/" \
            custom_components/backrest/manifest.json
          echo "Set manifest version to ${VERSION}"

      # Zip up only the integration folder — this is what HACS downloads
      - name: Create release zip
        run: |
          cd custom_components
          zip -r ../backrest.zip backrest/
          cd ..
          echo "Created backrest.zip"

      # Attach the zip to the GitHub release so HACS can fetch it
      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: backrest.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
